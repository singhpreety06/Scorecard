<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flipkart Minutes — Store Scorecard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}
    select{font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #d0d0c8;background:#fff;color:#1a1a1a;cursor:pointer;width:100%}
    .header{background:#F5A623;padding:14px 22px;display:flex;align-items:center;justify-content:space-between}
    .logo-row{display:flex;align-items:center;gap:12px}
    .logo-box{width:40px;height:40px;background:#fff3;border-radius:10px;display:flex;align-items:center;justify-content:center}
    .logo-title{font-size:16px;font-weight:500;color:#fff}
    .logo-sub{font-size:11px;color:#ffffffbb;margin-top:1px}
    .hbadge{background:#fff2;border:1px solid #fff3;border-radius:8px;padding:6px 14px;font-size:12px;color:#fff;display:flex;align-items:center;gap:6px}
    .filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 22px;background:#fff;border-bottom:1px solid #e8e8e0}
    .fg{display:flex;flex-direction:column;gap:5px}
    .fg label{font-size:10px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
    .body{padding:16px 22px;display:flex;flex-direction:column;gap:16px}
    .hero{border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr 120px 120px;background:#111d35}
    .hero-score{padding:20px 22px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid #ffffff0f}
    .score-label{font-size:10px;color:#6b85b0;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .score-big{font-size:48px;font-weight:500;color:#fff;line-height:1}
    .score-denom{font-size:16px;color:#4a6a9a;font-weight:400}
    .cat-pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500}
    .hero-store{padding:20px 22px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid #ffffff0f;flex:1}
    .store-name{font-size:17px;font-weight:500;color:#fff;margin-bottom:3px}
    .store-meta{font-size:12px;color:#6b85b0;display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .meta-sep{width:3px;height:3px;border-radius:50%;background:#4a6a9a;display:inline-block}
    .pm-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .pm-label{font-size:11px;color:#8aa0c0;width:130px;flex-shrink:0}
    .pm-bar{flex:1;height:4px;background:#ffffff12;border-radius:3px}
    .pm-fill{height:4px;border-radius:3px}
    .pm-val{font-size:11px;width:36px;text-align:right;flex-shrink:0}
    .hero-rank{padding:20px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #ffffff0f}
    .hero-rank2{padding:20px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .rank-ring{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;margin-bottom:6px;border:2px solid}
    .rank-title{font-size:10px;color:#6b85b0;text-transform:uppercase;letter-spacing:.05em;text-align:center}
    .rank-sub{font-size:11px;color:#4a6a9a;text-align:center;margin-top:3px}
    .section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .section-hdr .line{flex:1;height:1px;background:#e8e8e0}
    .section-hdr span{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
    .metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .mcard{background:#fff;border:1px solid #e8e8e0;border-radius:12px;overflow:hidden}
    .mcard-accent{height:3px}
    .mcard-body{padding:12px 14px}
    .mcard-name{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
    .mcard-pts{font-size:28px;font-weight:500;line-height:1;margin-bottom:2px}
    .mcard-pts .d{font-size:13px;font-weight:400;color:#888}
    .bar-wrap{height:5px;background:#e8e8e0;border-radius:3px;margin-bottom:12px}
    .bar-fill{height:5px;border-radius:3px}
    .mcard-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid #e8e8e0}
    .mf-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em}
    .mf-val{font-size:14px;font-weight:500}
    .na-card{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;color:#888;font-size:12px;gap:6px}
    .stbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e8e8e0;border-radius:12px;overflow:hidden;table-layout:fixed}
    .stbl th{font-size:10px;color:#888;padding:10px 14px;text-align:left;background:#f5f5f0;border-bottom:1px solid #e8e8e0;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
    .stbl th.r,.stbl td.r{text-align:right}
    .stbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid #e8e8e0;vertical-align:middle}
    .stbl tr:last-child td{border-bottom:none}
    .stbl tbody tr:hover td{background:#f5f5f0}
    .stbl tfoot td{background:#f5f5f0;border-top:1px solid #d0d0c8}
    .dots{display:flex;gap:3px}
    .dot{width:11px;height:11px;border-radius:3px}
    .tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500}
    .tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .footer{font-size:11px;color:#888;padding:10px 0 4px;border-top:1px solid #e8e8e0;display:flex;justify-content:space-between}
    .loading{padding:60px;text-align:center;color:#888;font-size:13px}
    .error{padding:40px;text-align:center;color:#E24B4A;font-size:13px;line-height:2}
  </style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-box">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </div>
    <div>
      <div class="logo-title">Flipkart Minutes</div>
      <div class="logo-sub">Franchise Ops Scorecard — 3PL Stores</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="hbadge" id="statusBadge">Loading...</div>
    <div class="hbadge" id="hdate">—</div>
  </div>
</div>

<div class="filters">
  <div class="fg"><label>Date</label><select id="selDate" onchange="onDateChange()"></select></div>
  <div class="fg"><label>City</label><select id="selCity" onchange="onCityChange()"></select></div>
  <div class="fg"><label>Store ID</label><select id="selId" onchange="onIdChange()"></select></div>
  <div class="fg"><label>Store Name</label><select id="selName" onchange="onNameChange()"></select></div>
</div>

<div class="body" id="body"><div class="loading">Fetching live data...</div></div>

<script>
const JSON_URL = 'https://raw.githubusercontent.com/singhpreety06/Scorecard/refs/heads/main/scores.json';

const METRICS = [
  {key:'putaway_pts', name:'Putaway TAT',        color:'#378ADD'},
  {key:'ppi_pts',     name:'Instore Time (PPI)', color:'#1D9E75'},
  {key:'bags_pts',    name:'Reusable Bags',      color:'#7F77DD'},
  {key:'inf_pts',     name:'INF Cancellation',   color:'#D4537E'},
  {key:'losses_pts',  name:'Losses',             color:'#D85A30'},
];

const STORE_NAMES = {
  'PUN_114_WH_HL_01':'Hinjewadi Phase 3',
  'PUN_144_WH_HL_01':'Marunji',
  'PUN_140_WH_HL_01':'Pimple Gurav',
  'KOL_103_WH_HL_01':'Kamalgazi',
  'BEN_229_WH_HL_01':'Dommasandra',
};

let SCOREDATA={}, curDate='', curCity='All', curStoreIdx=0;

function getCategory(s,max){
  const p=(s/max)*100;
  if(p>=90)return{label:'Outstanding',          tc:'#085041',bg:'#E1F5EE',dot:'#1D9E75'};
  if(p>=80)return{label:'Exceeds Expectation',  tc:'#0C447C',bg:'#E6F1FB',dot:'#378ADD'};
  if(p>=65)return{label:'Meets Expectation',    tc:'#27500A',bg:'#EAF3DE',dot:'#639922'};
  if(p>=50)return{label:'Meets Some Expectation',tc:'#633806',bg:'#FAEEDA',dot:'#BA7517'};
  return         {label:'Does Not Meet',        tc:'#791F1F',bg:'#FCEBEB',dot:'#E24B4A'};
}
function dotColor(p){if(p>=4)return'#1D9E75';if(p>=3)return'#378ADD';if(p>=2)return'#BA7517';return'#E24B4A';}
function makeDots(pts){
  if(pts==null)return'—';
  const full=Math.round(pts),c=dotColor(pts);
  return '<div class="dots">'+Array.from({length:5},(_,i)=>`<div class="dot" style="background:${i<full?c:'#e0e0d8'}"></div>`).join('')+'</div>';
}
function formatDate(d){
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}
}
function uniqueDates(){return Object.keys(SCOREDATA).sort((a,b)=>b.localeCompare(a));}
function storesForDate(date){return Object.values(SCOREDATA[date]?.stores||{});}
function filteredStores(date,city){const s=storesForDate(date);return city==='All'?s:s.filter(x=>x.city===city);}
function uniqueCities(date){return['All',...new Set(storesForDate(date).map(s=>s.city))].sort();}

function populateDates(){
  const dates=uniqueDates();
  document.getElementById('selDate').innerHTML=dates.map(d=>`<option value="${d}">${formatDate(d)}</option>`).join('');
  curDate=dates[0]||'';
  document.getElementById('hdate').textContent='D-1: '+formatDate(curDate);
}
function populateCities(){
  document.getElementById('selCity').innerHTML=uniqueCities(curDate).map(c=>`<option value="${c}">${c}</option>`).join('');
  curCity='All';
}
function populateStores(){
  const stores=filteredStores(curDate,curCity);
  document.getElementById('selId').innerHTML=stores.map((s,i)=>`<option value="${i}">${s.store_id}</option>`).join('');
  document.getElementById('selName').innerHTML=stores.map((s,i)=>`<option value="${i}">${STORE_NAMES[s.store_id]||s.store_id}</option>`).join('');
  curStoreIdx=0;
}
function onDateChange(){curDate=document.getElementById('selDate').value;document.getElementById('hdate').textContent='D-1: '+formatDate(curDate);populateCities();populateStores();render();}
function onCityChange(){curCity=document.getElementById('selCity').value;populateStores();render();}
function onIdChange(){curStoreIdx=parseInt(document.getElementById('selId').value);document.getElementById('selName').value=curStoreIdx;render();}
function onNameChange(){curStoreIdx=parseInt(document.getElementById('selName').value);document.getElementById('selId').value=curStoreIdx;render();}

function render(){
  const stores=filteredStores(curDate,curCity);
  if(!stores.length){document.getElementById('body').innerHTML='<div class="loading">No data for selected filters.</div>';return;}
  const store=stores[curStoreIdx]||stores[0];
  const dateData=SCOREDATA[curDate];
  const totalStores=dateData?.total_stores||storesForDate(curDate).length;
  const ts=store.total_score;
  const maxScore=store.losses_pts!=null?100:80;
  const cat=getCategory(ts,maxScore);
  const airColor=store.air<=3?'#F5A623':store.air<=Math.ceil(totalStores*.25)?'#1D9E75':store.air<=Math.ceil(totalStores*.5)?'#378ADD':'#888780';
  const crColor=store.city_rank===1?'#F5A623':store.city_rank===2?'#1D9E75':'#378ADD';

  const miniRows=METRICS.filter(m=>m.key!=='losses_pts').map(m=>{
    const pts=store[m.key];
    const pct=pts!=null?(pts/5*100).toFixed(0):0;
    return `<div class="pm-row"><span class="pm-label">${m.name}</span><div class="pm-bar"><div class="pm-fill" style="width:${pct}%;background:${m.color}"></div></div><span class="pm-val" style="color:${m.color}">${pts!=null?pts.toFixed(2):'—'}/5</span></div>`;
  }).join('');

  const hero=`<div class="hero">
    <div class="hero-score">
      <div class="score-label">Score (${store.losses_pts!=null?'5':'4'} of 5 metrics)</div>
      <div style="display:flex;align-items:baseline;gap:2px"><div class="score-big">${ts!=null?ts.toFixed(1):'—'}</div><div class="score-denom">/${maxScore}</div></div>
      <div class="cat-pill" style="background:${cat.bg};color:${cat.tc}"><span style="width:7px;height:7px;border-radius:50%;background:${cat.dot};display:inline-block;flex-shrink:0"></span>${cat.label}</div>
    </div>
    <div class="hero-store">
      <div class="store-name">${STORE_NAMES[store.store_id]||store.store_id}</div>
      <div class="store-meta"><span>${store.store_id}</span><span class="meta-sep"></span><span>${store.city}</span><span class="meta-sep"></span><span style="background:#ffffff12;padding:2px 8px;border-radius:4px;font-size:11px;color:#8aa0c0">${formatDate(curDate)}</span></div>
      <div>${miniRows}</div>
    </div>
    <div class="hero-rank">
      <div class="rank-ring" style="color:${airColor};border-color:${airColor}33;background:${airColor}15">#${store.air}</div>
      <div class="rank-title">All India Rank</div>
      <div class="rank-sub">of ${totalStores} stores</div>
    </div>
    <div class="hero-rank2">
      <div class="rank-ring" style="color:${crColor};border-color:${crColor}33;background:${crColor}15">#${store.city_rank}</div>
      <div class="rank-title">City rank</div>
      <div class="rank-sub">${store.city} · ${store.city_total} stores</div>
    </div>
  </div>`;

  const mcards=METRICS.map(m=>{
    const pts=store[m.key];
    if(pts==null)return `<div class="mcard"><div class="mcard-accent" style="background:${m.color}"></div><div class="mcard-body"><div class="mcard-name" style="color:${m.color}">${m.name}</div><div class="na-card">Data pending</div></div></div>`;
    const pct=(pts/5*100).toFixed(0),dc=dotColor(pts),ws=(pts/5*20).toFixed(2);
    return `<div class="mcard"><div class="mcard-accent" style="background:${m.color}"></div><div class="mcard-body"><div class="mcard-name" style="color:${m.color}">${m.name}</div><div class="mcard-pts" style="color:${dc}">${pts.toFixed(2)}<span class="d">/5</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${m.color}"></div></div><div class="mcard-footer"><div><div class="mf-label">Score /20</div><div class="mf-val" style="color:${m.color}">${ws}</div></div><div style="text-align:right"><div class="mf-label">Weight</div><div class="mf-val">20%</div></div></div></div></div>`;
  }).join('');

  const trows=METRICS.map(m=>{
    const pts=store[m.key],dc=pts!=null?dotColor(pts):'#888',ws=pts!=null?(pts/5*20).toFixed(2):'—';
    return `<tr><td><div class="tag"><span class="tag-dot" style="background:${m.color}"></span>${m.name}</div></td><td>${pts!=null?makeDots(pts):'—'}</td><td class="r" style="font-weight:500;color:${dc}">${pts!=null?pts.toFixed(2):'—'}</td><td class="r"><span style="background:#f5f5f0;padding:2px 8px;border-radius:4px;font-size:12px">20%</span></td><td class="r" style="font-weight:500">${ws!=='—'?ws+'<span style="font-size:11px;color:#888">/20</span>':'—'}</td></tr>`;
  }).join('');

  document.getElementById('body').innerHTML=`
    ${hero}
    <div>
      <div class="section-hdr"><span>Metric breakdown</span><div class="line"></div>
        <div style="display:flex;gap:6px">${['#1D9E75','#378ADD','#BA7517','#E24B4A'].map((c,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#888;padding:3px 8px;border-radius:12px;border:1px solid #e8e8e0;background:#f5f5f0"><div style="width:8px;height:8px;border-radius:2px;background:${c}"></div>${['4–5 pts','3 pts','2 pts','0–1 pts'][i]}</div>`).join('')}</div>
      </div>
      <div class="metrics-grid">${mcards}</div>
    </div>
    <div>
      <div class="section-hdr"><span>Score summary</span><div class="line"></div></div>
      <table class="stbl">
        <thead><tr><th style="width:30%">Metric</th><th style="width:16%">Score bar</th><th class="r" style="width:14%">Points /5</th><th class="r" style="width:12%">Weight</th><th class="r" style="width:16%">Score /20</th></tr></thead>
        <tbody>${trows}</tbody>
        <tfoot><tr><td colspan="4" style="text-align:right;font-weight:500;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.04em">Total</td><td class="r" style="font-size:18px;font-weight:500;color:${cat.dot}">${ts!=null?ts.toFixed(1):'—'}<span style="font-size:12px;color:#888;font-weight:400">/${maxScore}</span></td></tr></tfoot>
      </table>
    </div>
    <div class="footer"><span>Score /20 = (Points / 5) × 20 · Final = sum of all metric scores</span><span>AIR & city rank across all ${totalStores} stores for selected date</span></div>`;
}

async function init(){
  try{
    const res=await fetch(JSON_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    SCOREDATA=await res.json();
    const dates=Object.keys(SCOREDATA);
    if(!dates.length)throw new Error('No data found in JSON');
    document.getElementById('statusBadge').innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block"></span> Live · '+dates.length+' dates loaded';
    populateDates();populateCities();populateStores();render();
  }catch(e){
    document.getElementById('statusBadge').textContent='Error loading data';
    document.getElementById('body').innerHTML=`<div class="error">Failed to load data: ${e.message}<br><br>URL tried: ${JSON_URL}</div>`;
  }
}
init();
</script>
</body>
</html>
